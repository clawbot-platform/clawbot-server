name: clawbot-foundation

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_HOST}:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../deploy/docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - foundation

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_HOST}:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - foundation

  nats:
    image: ${NATS_IMAGE}
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "${NATS_HOST}:${NATS_PORT}:4222"
      - "${NATS_HOST}:${NATS_MONITOR_PORT}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v wget >/dev/null 2>&1; then wget -q -O /dev/null http://127.0.0.1:8222/healthz; else curl -fsS http://127.0.0.1:8222/healthz >/dev/null; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - foundation

networks:
  foundation:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
