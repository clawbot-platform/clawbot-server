services:
  # Local development override: keep only the core stack and make it easier to
  # use on a single-node workstation or homelab dry run.
  postgres:
    environment:
      TZ: UTC

  redis:
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--loglevel", "warning"]

  nats:
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222", "--server_name", "clawbot-nats"]
