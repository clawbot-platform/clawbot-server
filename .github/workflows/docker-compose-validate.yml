name: docker-compose-validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare environment
        run: ./scripts/prepare-ci-env.sh

      - name: Validate compose config
        run: make compose-validate

      - name: Start foundation stack
        run: make up

      - name: Smoke test
        run: make smoke

      - name: Tear down stack
        if: always()
        run: make clean
