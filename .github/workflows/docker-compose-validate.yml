name: docker-compose-validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/REQUIRED_SECRET_replace_me_postgres/test-postgres-password/g' .env
          sed -i 's/REQUIRED_SECRET_replace_me_minio/test-minio-password/g' .env
          sed -i 's/REQUIRED_SECRET_replace_me_grafana/test-grafana-password/g' .env
          sed -i 's/REQUIRED_SECRET_replace_me_omniroute_api_key/test-omniroute-key/g' .env
          sed -i 's/REQUIRED_SECRET_replace_me_zeroclaw_token/test-zeroclaw-token/g' .env

      - name: Validate compose config
        run: make compose-validate

      - name: Start foundation stack
        run: make up

      - name: Sync Go modules
        run: go mod tidy

      - name: Smoke test
        run: make smoke

      - name: Tear down stack
        if: always()
        run: make clean
