name: docker-compose-validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare environment
        run: ./scripts/prepare-ci-env.sh

      - name: Validate core environment
        run: ./scripts/check-env.sh .env

      - name: Validate optional environment
        run: VALIDATE_OPTIONAL_STACK=1 ./scripts/check-env.sh .env

      - name: Validate core compose config
        run: make compose-validate

      - name: Validate optional compose config
        run: |
          docker compose --env-file .env \
            -f deploy/compose/docker-compose.yml \
            -f deploy/compose/docker-compose.override.yml \
            -f deploy/compose/docker-compose.optional.yml \
            config >/dev/null

      - name: Start core foundation stack
        run: make up

      - name: Smoke test
        run: make smoke

      - name: Tear down stack
        if: always()
        run: make clean
