# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
      CLAWBOT_TEST_DATABASE_URL: postgres://clawbot:clawbot@127.0.0.1:5432/clawbot_test?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clawbot_test
          POSTGRES_USER: clawbot
          POSTGRES_PASSWORD: clawbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawbot -d clawbot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          fmt_out=$(find cmd internal -name '*.go' -print | xargs gofmt -l)
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarCloud quality gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 10
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Skip Sonar when token is unavailable
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "Skipping SonarCloud because SONAR_TOKEN is not available for this run."
