name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest
    env:
      CLAWBOT_TEST_DATABASE_URL: postgres://clawbot:clawbot@127.0.0.1:5432/clawbot_test?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clawbot_test
          POSTGRES_USER: clawbot
          POSTGRES_PASSWORD: clawbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawbot -d clawbot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          fmt_out=$(find cmd internal -name '*.go' -print | xargs gofmt -l)
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Unit tests with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "## Go coverage"
            echo
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.txt
